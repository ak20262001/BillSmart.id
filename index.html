<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billsmart.id - POS Digital Exhibition</title>
    <style>
        :root {
            --accent: #d4af37;
            --accent2: #f5d576;
            --accent-rgb: 212, 175, 55;
            --bg-body: #0d0d0d;
            --bg-header: #111111;
            --bg-panel: #111111;
            --bg-card: #1a1a1a;
            --text-primary: #f5f5f5;
            --text-secondary: #bbbbbb;
            --radius: 8px;
            --shadow-xl: 0 0 25px rgba(var(--accent-rgb), .55);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 35%, #3b2f2f 70%, #5a3e2b 100%);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before, body::after {
            content: ""; position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.25; z-index: -1;
        }
        body::before { width: 400px; height: 400px; background: #c8a27a; top: -100px; right: -100px; }
        body::after { width: 500px; height: 500px; background: #8b5e3c; bottom: -150px; left: -150px; }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 1.5rem; background: var(--bg-header);
            border-bottom: 2px solid var(--accent); box-shadow: var(--shadow-xl);
        }
        .header h1 {
            font-size: 2.1rem; color: var(--accent); letter-spacing: 2px;
            animation: neonGlow 2s ease-in-out infinite alternate;
        }
        @keyframes neonGlow {
            from { text-shadow: 0 0 5px var(--accent); }
            to { text-shadow: 0 0 20px var(--accent), 0 0 40px rgba(var(--accent-rgb),0.6); }
        }

        .pos-container {
            display: flex; flex: 1; height: calc(100vh - 78px); padding: 8px; gap: 8px;
        }

        .sidebar {
            width: 220px; background: var(--bg-panel); border-right: 2px solid var(--accent);
            padding: 1rem; overflow-y: auto; border-radius: var(--radius);
        }

        .menu-grid {
            flex: 1; padding: 1rem; overflow-y: auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 16px;
        }

        .menu-item {
            background: var(--bg-card); border-radius: var(--radius); overflow: hidden;
            cursor: pointer; transition: all 0.3s; border: 1px solid #333;
        }
        .menu-item:hover {
            transform: translateY(-8px); box-shadow: var(--shadow-xl); border-color: var(--accent);
        }
        .menu-item img {
            width: 100%; height: 140px; object-fit: cover;
        }

        .cart {
            width: 340px; background: var(--bg-panel); border-left: 2px solid var(--accent);
            padding: 1rem; display: flex; flex-direction: column; border-radius: var(--radius);
        }

        .cart-item {
            display: flex; justify-content: space-between; padding: 12px 0;
            border-bottom: 1px solid #333;
        }

        .btn {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #0a0a0a; font-weight: bold; border: none; padding: 12px 16px;
            border-radius: var(--radius); cursor: pointer;
        }

        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: #1a1a1a; padding: 2rem; border-radius: 12px; width: 90%; max-width: 600px;
            border: 2px solid var(--accent); max-height: 90vh; overflow-y: auto;
        }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 14px 24px; border-radius: 8px; z-index: 2000; display: none;
            font-weight: 500; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Billsmart.id</h1>
    <div>
        <button onclick="openAdminModal()" class="btn" style="margin-right:10px;">⚙️ Admin</button>
        <button onclick="doLogout()" class="btn">Keluar</button>
    </div>
</div>

<div class="pos-container">
    <!-- Sidebar -->
    <div class="sidebar">
        <input type="text" id="searchInput" placeholder="🔍 Cari menu..." 
               style="width:100%;padding:12px;margin-bottom:15px;border-radius:6px;border:1px solid var(--accent);background:#222;color:white;"
               onkeyup="filterMenu()">
        <div id="categoryList" style="margin-top:10px;"></div>
    </div>

    <!-- Menu Grid -->
    <div class="menu-grid" id="menuGrid"></div>

    <!-- Cart -->
    <div class="cart">
        <h2 style="margin-bottom:15px;">🛒 Keranjang</h2>
        <div id="cartItems" style="flex:1;overflow-y:auto;"></div>
        
        <div style="margin-top:auto; padding-top:15px; border-top:1px solid #333;">
            <div style="font-size:1.35rem;font-weight:bold;margin-bottom:15px;">
                Total: <span id="cartTotal" style="color:var(--accent);">Rp 0</span>
            </div>
            <button onclick="checkout()" class="btn" style="width:100%;padding:16px;font-size:1.1rem;">
                💰 Checkout & Bayar
            </button>
        </div>
    </div>
</div>

<!-- Admin Modal -->
<div id="adminModal" class="modal">
    <div class="modal-content">
        <h2>🔧 Panel Admin</h2>
        <p style="margin:15px 0;color:#aaa;">Kelola menu dan stok</p>
        <button onclick="addNewMenu()" class="btn" style="width:100%;margin-bottom:10px;">+ Tambah Menu Baru</button>
        <button onclick="closeModal('adminModal')" class="btn" style="width:100%;background:#555;">Tutup</button>
    </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast"></div>

<script>
// ================= CONFIG =================
const API_BASE = window.location.origin;
const token = localStorage.getItem('bs_token');

if (!token) {
    window.location.href = 'login.html';
}

// ================= API HELPER =================
async function apiCall(endpoint, method = 'GET', body = null) {
    try {
        const res = await fetch(API_BASE + endpoint, {
            method,
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: body ? JSON.stringify(body) : null
        });

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || 'Server error');
        }
        return await res.json();
    } catch (err) {
        console.error(err);
        showToast(err.message || 'Terjadi kesalahan koneksi', 'error');
        throw err;
    }
}

// ================= LOAD MENU =================
async function loadMenu() {
    try {
        const data = await apiCall('/api/menu');
        renderMenu(data.items || []);
        renderCategories(data.items || []);
    } catch (e) {
        console.error(e);
    }
}

function renderMenu(items) {
    const grid = document.getElementById('menuGrid');
    grid.innerHTML = items.map(item => `
        <div class="menu-item" onclick="addToCart('${item.id}', '${item.name.replace(/'/g, "\\'")}', ${item.price})">
            <img src="${item.image_url || `https://via.placeholder.com/300x180/333/d4af37?text=${encodeURIComponent(item.name)}`}" alt="${item.name}">
            <div style="padding:12px;">
                <h4>${item.name}</h4>
                <p style="color:var(--accent);font-weight:bold;">Rp ${item.price.toLocaleString('id-ID')}</p>
                <small>Stok: ${item.stock || 'Tersedia'}</small>
            </div>
        </div>
    `).join('');
}

function renderCategories(items) {
    const cats = [...new Set(items.map(i => i.category))];
    const html = cats.map(cat => `
        <div onclick="filterByCategory('${cat}')" style="padding:8px 12px;cursor:pointer;border-radius:6px;margin:4px 0;background:#222;">
            ${cat}
        </div>
    `).join('');
    document.getElementById('categoryList').innerHTML = `<strong>Kategori</strong><div>${html}</div>`;
}

// ================= CART =================
let cart = [];

function addToCart(id, name, price) {
    const existing = cart.find(i => i.id === id);
    if (existing) existing.qty += 1;
    else cart.push({ id, name, price, qty: 1 });
    
    renderCart();
    showToast(`${name} ditambahkan ke keranjang`);
}

function renderCart() {
    const container = document.getElementById('cartItems');
    let total = 0;
    let html = '';

    cart.forEach((item, index) => {
        const subtotal = item.price * item.qty;
        total += subtotal;
        html += `
            <div class="cart-item">
                <div>
                    <strong>${item.name}</strong><br>
                    <small>Rp ${item.price.toLocaleString('id-ID')} × ${item.qty}</small>
                </div>
                <div style="text-align:right;">
                    <strong>Rp ${subtotal.toLocaleString('id-ID')}</strong><br>
                    <button onclick="removeFromCart(${index})" style="color:#ff6666;background:none;border:none;font-size:0.9rem;cursor:pointer;">Hapus</button>
                </div>
            </div>`;
    });

    container.innerHTML = html || '<p style="text-align:center;color:#777;padding:30px 0;">Keranjang masih kosong</p>';
    document.getElementById('cartTotal').textContent = `Rp ${total.toLocaleString('id-ID')}`;
}

function removeFromCart(index) {
    cart.splice(index, 1);
    renderCart();
}

// ================= CHECKOUT =================
async function checkout() {
    if (cart.length === 0) return showToast('Keranjang kosong!', 'error');

    const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);

    try {
        await apiCall('/api/transactions', 'POST', {
            items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qty })),
            subtotal: total,
            total: total,
            payment_method: 'tunai'
        });

        showToast('✅ Transaksi berhasil disimpan!', 'success');
        cart = [];
        renderCart();
        loadMenu(); // refresh stok
    } catch (e) {
        showToast('Gagal menyimpan transaksi', 'error');
    }
}

// ================= ADMIN & UTILS =================
function openAdminModal() {
    document.getElementById('adminModal').style.display = 'flex';
}

function closeModal(id) {
    document.getElementById(id).style.display = 'none';
}

function addNewMenu() {
    const name = prompt("Nama Menu:");
    if (!name) return;
    const price = parseInt(prompt("Harga (Rp):"));
    if (!price) return;

    apiCall('/api/menu', 'POST', {
        category: "Umum",
        name: name,
        price: price,
        stock: 50
    }).then(() => {
        showToast('Menu berhasil ditambahkan');
        loadMenu();
    }).catch(() => showToast('Gagal menambahkan menu'));
}

function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.style.background = type === 'success' ? '#00c853' : '#f44336';
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 3000);
}

function filterMenu() {
    const term = document.getElementById('searchInput').value.toLowerCase().trim();
    document.querySelectorAll('.menu-item').forEach(item => {
        item.style.display = item.textContent.toLowerCase().includes(term) ? '' : 'none';
    });
}

function filterByCategory(cat) {
    document.querySelectorAll('.menu-item').forEach(item => {
        item.style.display = item.textContent.includes(cat) ? '' : 'none';
    });
}

function doLogout() {
    if (confirm('Keluar dari aplikasi?')) {
        localStorage.clear();
        window.location.href = 'login.html';
    }
}

// ================= INIT =================
loadMenu();
</script>
</body>
</html>
