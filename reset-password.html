<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#05050e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Billsmart.id — Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold:        #d4a843;
            --gold-light:  #f0c96a;
            --gold-glow:   rgba(212,168,67,.18);
            --gold-border: rgba(212,168,67,.22);
            --gold-dim:    rgba(212,168,67,.09);
            --ink:         #05050e;
            --card:        #0d0d1f;
            --line:        rgba(255,255,255,.055);
            --text:        #edeaf3;
            --text2:       #9691a8;
            --muted:       #504a68;
            --err:         #e8566a;
            --ok:          #00cc7a;
            --r-card:      22px;
            --r-btn:       12px;
            --r-field:     11px;
            --T:           .22s cubic-bezier(.4,0,.2,1);
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { -webkit-tap-highlight-color:transparent; }
        body {
            font-family:'DM Sans', sans-serif;
            background:var(--ink); color:var(--text);
            min-height:100vh; min-height:100dvh;
            display:flex; align-items:center;
            justify-content:center; padding:1.5rem;
            overflow-x:hidden;
        }
        input, button { font-family:inherit; }

        /* Background */
        .bg-canvas {
            position:fixed; inset:0; z-index:0; pointer-events:none;
            background:
                radial-gradient(ellipse 80% 70% at 25% 25%, rgba(212,168,67,.055) 0%, transparent 55%),
                radial-gradient(ellipse 60% 75% at 85% 85%, rgba(60,30,150,.05) 0%, transparent 55%),
                linear-gradient(175deg, #05050e, #090920, #05050e);
        }
        .bg-grid {
            position:fixed; inset:0; z-index:0; pointer-events:none;
            background-image:
                linear-gradient(rgba(212,168,67,.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212,168,67,.018) 1px, transparent 1px);
            background-size:60px 60px;
            mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
        }
        .orb {
            position:fixed; border-radius:50%; filter:blur(110px);
            pointer-events:none; z-index:0;
        }
        .orb-a {
            width:700px; height:700px;
            background:radial-gradient(circle, rgba(212,168,67,.045), transparent 60%);
            top:-300px; left:-250px;
            animation:floatA 22s ease-in-out infinite alternate;
        }
        .orb-b {
            width:500px; height:500px;
            background:radial-gradient(circle, rgba(70,40,200,.035), transparent 60%);
            bottom:-180px; right:-180px;
            animation:floatB 18s ease-in-out infinite alternate;
        }
        @keyframes floatA { from{transform:translate(0,0)} to{transform:translate(50px,35px)} }
        @keyframes floatB { from{transform:translate(0,0)} to{transform:translate(-35px,-25px)} }

        /* Card */
        .card {
            position:relative; z-index:1;
            width:100%; max-width:420px;
            background:var(--card);
            border:1px solid var(--gold-border);
            border-radius:var(--r-card);
            padding:2.8rem 2.4rem;
            box-shadow:
                0 0 0 1px rgba(255,255,255,.02),
                0 50px 120px rgba(0,0,0,.7),
                0 0 80px rgba(212,168,67,.04);
            animation:cardIn .65s cubic-bezier(.15,.85,.25,1) both;
        }
        @keyframes cardIn {
            from { opacity:0; transform:translateY(30px) scale(.96); }
            to   { opacity:1; transform:none; }
        }
        .card::before {
            content:''; position:absolute;
            top:0; left:10%; right:10%; height:1px;
            background:linear-gradient(90deg, transparent, rgba(212,168,67,.6), transparent);
        }
        .card::after {
            content:''; position:absolute;
            bottom:0; left:20%; right:20%; height:1px;
            background:linear-gradient(90deg, transparent, rgba(212,168,67,.1), transparent);
        }

        /* Corner decoration */
        .corner-deco {
            position:absolute; top:16px; right:20px;
            opacity:.22; pointer-events:none;
        }

        /* Logo */
        .logo {
            font-family:'Playfair Display', serif;
            font-size:1.65rem; font-weight:700; letter-spacing:-.3px;
            background:linear-gradient(130deg, var(--gold), var(--gold-light));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
            margin-bottom:.25rem;
        }
        .tagline {
            font-size:.65rem; color:var(--muted);
            letter-spacing:1.5px; text-transform:uppercase;
            margin-bottom:2rem;
        }

        /* Icon */
        .icon-wrap {
            width:62px; height:62px; border-radius:50%;
            background:var(--gold-dim); border:1px solid var(--gold-border);
            display:flex; align-items:center; justify-content:center;
            font-size:1.65rem; margin-bottom:1.2rem;
            animation:popIn .6s cubic-bezier(.15,.85,.3,1) .3s both;
        }
        @keyframes popIn {
            from { opacity:0; transform:scale(.4) rotate(-8deg); }
            to   { opacity:1; transform:none; }
        }

        h2 {
            font-family:'Playfair Display', serif;
            font-size:1.5rem; font-weight:700; margin-bottom:.35rem;
        }
        .sub {
            font-size:.8rem; color:var(--text2);
            line-height:1.7; margin-bottom:1.5rem; font-weight:300;
        }

        /* Msg */
        .msg-box {
            padding:.68rem .9rem; border-radius:9px;
            font-size:.77rem; font-weight:500;
            margin-bottom:.85rem; display:none;
            align-items:flex-start; gap:.5rem; line-height:1.5;
        }
        .msg-box.show { display:flex; }
        .msg-box.err  { background:rgba(232,86,106,.08); border:1px solid rgba(232,86,106,.2); color:var(--err); }
        .msg-box.ok   { background:rgba(0,204,122,.08);  border:1px solid rgba(0,204,122,.2);  color:var(--ok);  }

        /* Fields */
        .field { margin-bottom:.9rem; }
        .field label {
            display:block; font-size:.68rem; color:var(--text2);
            font-weight:500; letter-spacing:.6px; text-transform:uppercase;
            margin-bottom:.42rem;
        }
        .field-wrap { position:relative; }
        .field-input {
            width:100%; padding:.78rem 2.8rem .78rem 1rem;
            background:rgba(255,255,255,.028);
            border:1px solid rgba(255,255,255,.06);
            border-radius:var(--r-field);
            color:var(--text); font-size:.87rem; font-weight:300;
            outline:none; transition:var(--T);
            -webkit-appearance:none; appearance:none;
        }
        .field-input:focus {
            border-color:rgba(212,168,67,.5);
            background:rgba(255,255,255,.045);
            box-shadow:0 0 0 3px rgba(212,168,67,.1);
        }
        .field-input::placeholder { color:rgba(255,255,255,.15); }
        .field-input.has-err {
            border-color:rgba(232,86,106,.4);
            box-shadow:0 0 0 3px rgba(232,86,106,.08);
        }

        .eye-btn {
            position:absolute; right:.8rem; top:50%; transform:translateY(-50%);
            background:none; border:none; cursor:pointer;
            color:var(--muted); font-size:.9rem; padding:.25rem;
            transition:color .2s; line-height:1;
        }
        .eye-btn:hover { color:var(--text2); }

        /* Button */
        .btn {
            width:100%; padding:.88rem;
            border:none; cursor:pointer; border-radius:var(--r-btn);
            background:linear-gradient(135deg, var(--gold) 0%, #9e6e00 100%);
            color:#050510; font-size:.88rem; font-weight:700;
            letter-spacing:.6px; text-transform:uppercase;
            transition:var(--T); margin-top:.3rem;
            box-shadow:0 4px 24px rgba(212,168,67,.2);
            display:flex; align-items:center; justify-content:center; gap:.5rem;
        }
        .btn:hover:not(:disabled) {
            transform:translateY(-2px);
            box-shadow:0 14px 36px rgba(212,168,67,.35);
        }
        .btn:active:not(:disabled) { transform:none; box-shadow:none; }
        .btn:disabled { opacity:.45; cursor:not-allowed; }

        .btn-spinner {
            width:15px; height:15px;
            border:2px solid rgba(5,5,16,.22);
            border-top-color:#050510;
            border-radius:50%; animation:spin .6s linear infinite; display:none;
        }
        @keyframes spin { to{transform:rotate(360deg)} }

        .back-link {
            display:block; text-align:center;
            margin-top:1.2rem; font-size:.75rem;
            color:var(--gold); text-decoration:none;
            transition:opacity .2s;
        }
        .back-link:hover { opacity:.7; }

        @media (max-width:480px) {
            .card { padding:2rem 1.3rem 2.8rem; border-radius:16px; }
        }
        @supports (padding:max(0px)) {
            .card { padding-bottom:max(2.5rem, env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body>
    <div class="bg-canvas"></div>
    <div class="bg-grid"></div>
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>

    <div class="card">
        <!-- Corner deco -->
        <div class="corner-deco">
            <svg width="42" height="42" viewBox="0 0 42 42" fill="none">
                <path d="M2 40 L2 2 L40 2" stroke="#d4a843" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="2" cy="2" r="2" fill="#d4a843"/>
                <circle cx="40" cy="2" r="1.5" fill="#d4a843" opacity=".5"/>
                <circle cx="2" cy="40" r="1.5" fill="#d4a843" opacity=".5"/>
            </svg>
        </div>

        <div class="logo">Billsmart.id</div>
        <div class="tagline">Sistem Kasir Digital Premium</div>

        <div class="icon-wrap">🔐</div>
        <h2>Password Baru</h2>
        <p class="sub">Buat password baru yang kuat untuk mengamankan akun Billsmart.id Anda.</p>

        <div class="msg-box" id="msg"></div>

        <div class="field">
            <label>Password Baru</label>
            <div class="field-wrap">
                <input type="password" class="field-input" id="newPass"
                    placeholder="Min. 8 karakter" autocomplete="new-password">
                <button class="eye-btn" onclick="togglePw('newPass',this)" type="button">👁️</button>
            </div>
        </div>
        <div class="field">
            <label>Konfirmasi Password Baru</label>
            <div class="field-wrap">
                <input type="password" class="field-input" id="confPass"
                    placeholder="Ulangi password baru" autocomplete="new-password"
                    onkeydown="if(event.key==='Enter')doReset()">
                <button class="eye-btn" onclick="togglePw('confPass',this)" type="button">👁️</button>
            </div>
        </div>

        <button class="btn" id="btnReset" onclick="doReset()" type="button">
            <div class="btn-spinner" id="spin"></div>
            <span id="btnTxt">Simpan Password Baru</span>
        </button>

        <a class="back-link" href="login.html">← Kembali ke Halaman Login</a>
    </div>

    <script>
    const API_BASE = window.location.origin;
    const token    = new URLSearchParams(window.location.search).get('token');

    // Validate token on load
    if (!token) {
        const msg = document.getElementById('msg');
        msg.textContent = '⚠️ Link tidak valid atau sudah kadaluarsa. Minta link reset password baru.';
        msg.className = 'msg-box show err';
        document.getElementById('btnReset').disabled = true;
    }

    function togglePw(id, btn) {
        const inp = document.getElementById(id);
        if (!inp) return;
        inp.type = inp.type === 'password' ? 'text' : 'password';
        btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
    }

    function showMsg(text, type) {
        const el = document.getElementById('msg');
        el.textContent = text;
        el.className = 'msg-box show ' + type;
    }

    async function doReset() {
        const pass = document.getElementById('newPass').value;
        const conf = document.getElementById('confPass').value;

        // Reset styles
        document.getElementById('newPass').classList.remove('has-err');
        document.getElementById('confPass').classList.remove('has-err');
        document.getElementById('msg').className = 'msg-box';

        if (pass.length < 8) {
            document.getElementById('newPass').classList.add('has-err');
            showMsg('Password minimal 8 karakter.', 'err'); return;
        }
        if (pass !== conf) {
            document.getElementById('confPass').classList.add('has-err');
            showMsg('Konfirmasi password tidak cocok.', 'err'); return;
        }

        const btn = document.getElementById('btnReset');
        const spin = document.getElementById('spin');
        const txt  = document.getElementById('btnTxt');
        btn.disabled = true;
        spin.style.display = 'block';
        txt.textContent = 'Menyimpan...';

        try {
            const r = await fetch(`${API_BASE}/api/auth/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, password: pass })
            });
            const d = await r.json();

            if (!r.ok) {
                showMsg(d.error || 'Gagal reset password. Coba lagi.', 'err');
                btn.disabled = false; spin.style.display = 'none';
                txt.textContent = 'Simpan Password Baru';
                return;
            }

            showMsg('✅ Password berhasil direset! Mengarahkan ke halaman login...', 'ok');
            setTimeout(() => window.location.replace('login.html?verified=reset'), 2000);

        } catch {
            showMsg('Tidak dapat terhubung ke server. Pastikan server berjalan.', 'err');
            btn.disabled = false; spin.style.display = 'none';
            txt.textContent = 'Simpan Password Baru';
        }
    }
    </script>
</body>
</html>
